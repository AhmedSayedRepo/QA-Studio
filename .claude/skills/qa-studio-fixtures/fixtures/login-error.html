<html><body>
<form id="kc-form-login">
  <label for="username">اسم المستخدم</label>
  <input id="username" name="username" type="text" placeholder="البريد الإلكتروني"/>
  <label for="password">كلمة المرور</label>
  <input id="password" name="password" type="password"/>
  <span id="input-error" class="kc-feedback-text" role="alert">كلمة المرور غير صحيحة</span>
  <button id="kc-login" type="submit">تسجيل الدخول</button>
  <button id="lang-btn" aria-label="language" class="dropdown-toggle">اللغة</button>
</form>
</body></html>
